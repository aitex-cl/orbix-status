<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orbix — Estado del Sistema</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0c0e10;
      --surface:   #13161a;
      --border:    #1e2227;
      --border-hi: #2a3040;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --faint:     #2a2d35;
      --done:   #22c55e;
      --schema: #3b82f6;
      --plan:   #f59e0b;
      --future: #6b7280;
      --done-bg:   rgba(34,197,94,.08);
      --schema-bg: rgba(59,130,246,.08);
      --plan-bg:   rgba(245,158,11,.08);
      --future-bg: rgba(107,114,128,.06);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: .4; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 48px 24px 80px; position: relative; z-index: 1; }
    header { margin-bottom: 52px; }
    .logo-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
    .logo { font-family: 'DM Serif Display', serif; font-size: 32px; letter-spacing: -.5px; color: var(--text); }
    .logo-tag { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; border: 1px solid var(--border-hi); padding: 2px 8px; border-radius: 4px; }
    .subtitle { font-size: 13px; color: var(--muted); font-weight: 300; }
    .updated { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 4px; opacity: .7; }
    .legend { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 36px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
    .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .section { margin-bottom: 40px; }
    .section-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; padding-left: 2px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; display: flex; flex-direction: column; gap: 6px; transition: border-color .2s, transform .2s; cursor: default; animation: fadeUp .4s ease both; }
    .card:hover { border-color: var(--border-hi); transform: translateY(-1px); }
    .card:nth-child(1){animation-delay:.04s}.card:nth-child(2){animation-delay:.08s}.card:nth-child(3){animation-delay:.12s}.card:nth-child(4){animation-delay:.16s}.card:nth-child(5){animation-delay:.20s}.card:nth-child(6){animation-delay:.24s}.card:nth-child(7){animation-delay:.28s}.card:nth-child(8){animation-delay:.32s}
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .card-name { font-weight: 500; font-size: 14px; color: var(--text); line-height: 1.3; }
    .card-key { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 1px; }
    .card-desc { font-size: 12px; color: var(--muted); line-height: 1.5; font-weight: 300; }
    .card-price { font-family: 'DM Mono', monospace; font-size: 11px; color: #3a4050; margin-top: 4px; padding-top: 8px; border-top: 1px solid var(--border); }
    .badge { font-size: 10px; font-weight: 500; font-family: 'DM Mono', monospace; padding: 3px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; letter-spacing: .03em; }
    .b-done   { background: var(--done-bg);   color: var(--done);   border: 1px solid rgba(34,197,94,.2); }
    .b-schema { background: var(--schema-bg); color: var(--schema); border: 1px solid rgba(59,130,246,.2); }
    .b-plan   { background: var(--plan-bg);   color: var(--plan);   border: 1px solid rgba(245,158,11,.2); }
    .b-future { background: var(--future-bg); color: var(--future); border: 1px solid rgba(107,114,128,.15); }
    .stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 40px; padding: 20px 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-val { font-family: 'DM Serif Display', serif; font-size: 28px; line-height: 1; }
    .stat-label { font-size: 11px; color: var(--muted); font-weight: 300; }
    .sv-done{color:var(--done)}.sv-schema{color:var(--schema)}.sv-plan{color:var(--plan)}.sv-future{color:var(--future)}
    .progress-wrap { margin-bottom: 32px; }
    .progress-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 300; }
    .progress-track { height: 6px; background: var(--faint); border-radius: 99px; overflow: hidden; display: flex; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width 1.2s cubic-bezier(.16,1,.3,1); }
    .pf-done{background:var(--done)}.pf-schema{background:var(--schema)}.pf-plan{background:var(--plan)}
    footer { margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); font-weight: 300; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 600px) { .wrap{padding:32px 16px 60px} .logo{font-size:26px} .stats{gap:16px} .stat-val{font-size:22px} }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo-row"><span class="logo">Orbix</span><span class="logo-tag">Estado del sistema</span></div>
    <p class="subtitle">Módulos de negocio — seguimiento de desarrollo</p>
    <p class="updated" id="updated-ts"></p>
  </header>
  <div class="stats">
    <div class="stat"><span class="stat-val sv-done" id="cnt-done">0</span><span class="stat-label">implementados</span></div>
    <div class="stat"><span class="stat-val sv-schema" id="cnt-schema">0</span><span class="stat-label">en desarrollo</span></div>
    <div class="stat"><span class="stat-val sv-plan" id="cnt-plan">0</span><span class="stat-label">planificados</span></div>
    <div class="stat"><span class="stat-val sv-future" id="cnt-future">0</span><span class="stat-label">futuros</span></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label">Avance general del sistema</div>
    <div class="progress-track">
      <div class="progress-fill pf-done" id="pb-done" style="width:0%"></div>
      <div class="progress-fill pf-schema" id="pb-schema" style="width:0%;margin-left:2px"></div>
      <div class="progress-fill pf-plan" id="pb-plan" style="width:0%;margin-left:2px"></div>
    </div>
  </div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--done)"></div> Implementado</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--schema)"></div> Schema / En desarrollo</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--plan)"></div> Planificado</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--future)"></div> Futuro</div>
  </div>
  <div id="content"></div>
</div>
<footer style="max-width:900px;margin:0 auto;padding-left:24px;padding-right:24px;padding-bottom:40px;position:relative;z-index:1;">
  <span>Orbix &copy; 2026 &mdash; AITEX</span>
  <span><a href="https://admin.orbix.cl" target="_blank">Panel admin</a> &middot; <a href="https://app.orbix.cl" target="_blank">Portal</a> &middot; <a href="https://api.orbix.cl/api/health" target="_blank">API health</a></span>
</footer>
<script>
const SECTIONS = [
  { title: 'Infraestructura y plataforma', items: [
    { name: 'Multi-tenancy',     key: 'core',    status: 'done',   desc: 'Tenant, TenantModule, TenantSettings, UserModuleAccess. Datos completamente aislados por tenant.' },
    { name: 'Autenticación',    key: 'auth',    status: 'done',   desc: 'JWT + RefreshToken, roles ADMIN/USER, cambio de contraseña obligatorio.' },
    { name: 'Billing / Cobros', key: 'billing', status: 'done',   desc: 'ModulePrice, DiscountTier, Invoice, SubscriptionItem. Panel admin con precios editables y descuentos por volumen.' },
    { name: 'Almacenamiento',   key: 'storage', status: 'done',   desc: 'FileAttachment + Contabo Object Storage (S3 compatible). MinIO en desarrollo.' },
    { name: 'Panel super-admin',key: 'admin',   status: 'done',   desc: 'orbix-admin: gestión de tenants, módulos, billing, usuarios y precios globales.' },
    { name: 'Audit log',        key: 'audit',   status: 'schema', desc: 'Modelo AuditLog en schema. Integración en servicios pendiente.' },
    { name: 'IA / AiSession',   key: 'ai',      status: 'schema', desc: 'Modelo AiSession en schema. Integración por módulo pendiente.' },
  ]},
  { title: 'Maestros compartidos', items: [
    { name: 'Clientes',              key: 'clientes',    status: 'done', desc: 'Client + ClientContact. Importación masiva desde Excel.' },
    { name: 'Áreas',               key: 'areas',       status: 'done', desc: 'Modelo Area. Usado por Empleados y Proyectos.' },
    { name: 'Proyectos (maestro)',   key: 'proyectos-m', status: 'done', desc: 'Modelo Project con cliente, área, presupuesto y fechas.' },
    { name: 'Contactos (CRM base)', key: 'contactos',   status: 'done', desc: 'Contact, ContactTag, ContactRelationship, ContactEvent.' },
    { name: 'Productos / Servicios',key: 'productos',   status: 'done', desc: 'Product + ProductRecipe + ProductRecipeLine.' },
    { name: 'Condiciones de pago',  key: 'pagos',       status: 'done', desc: 'PaymentCondition. Integrado en cotizaciones.' },
  ]},
  { title: 'Módulos de negocio', items: [
    { name: 'Contact Relationships',       key: 'contacts',      status: 'done',   desc: 'Inteligencia relacional: contactos PERSON/COMPANY, vínculos, tags automáticos y manuales, historial de eventos. Integrado con Cotizaciones.', price: '$3.500 / usuario / mes' },
    { name: 'Control de Gastos',           key: 'gastos',        status: 'done',   desc: 'Expense, ExpenseReport, categorías, aprobaciones, pagos, adjuntos.', price: '$1.000 / usuario / mes' },
    { name: 'Cotizaciones',                key: 'cotizaciones',  status: 'done',   desc: 'Quote + QuoteItem, estados, folio automático, PDF, productos, UF.', price: '$3.500 / usuario / mes' },
    { name: 'Fichas Empleados',            key: 'empleados',     status: 'schema', desc: 'Modelo Employee completo en schema. UI pendiente. Sistema de documentos por empleado diseñado, no implementado.', price: '$2.000 / usuario / mes' },
    { name: 'Gestión de Proyectos (P&L)', key: 'proyectos',    status: 'plan',   desc: '⭐ Prioridad 1 — Próximo en desarrollo. Ciclo completo: cotización → proyecto → gastos + facturas de compra → margen real por proyecto.', price: '$12.000 / usuario / mes' },
    { name: 'Control de Cambios TI',       key: 'ti-cambios',    status: 'plan',   desc: 'Registro y trazabilidad de cambios en sistemas y equipos tecnológicos (servidores, switches, routers, etc.). Dirigido a áreas TI internas y empresas de soporte TI. Prioridad media — después de Gestión de Proyectos.', price: 'Precio por definir' },
    { name: 'SSOMA',                       key: 'ssoma',         status: 'plan',   desc: 'Carpeta de arranque por proyecto. isSsomaFolder en categorías de documentos. Requiere módulo Empleados primero.', price: '$6.500 / usuario / mes' },
    { name: 'Firma Electrónica',          key: 'anexos',        status: 'plan',   desc: 'Anexos de contrato con FEA. Integración con misabogados.com o genera.cl pendiente de evaluar API.', price: '$9.000 / usuario / mes' },
    { name: 'Liquidaciones de Sueldo',     key: 'liquidaciones', status: 'plan',   desc: 'Generación y envío al empleado para recepción conforme.', price: '$4.500 / usuario / mes' },
    { name: 'Facturación',               key: 'facturacion',   status: 'plan',   desc: 'Cuentas por cobrar, seguimiento de pagos, importación desde RCV del SII (Excel). Facturación recurrente con aprobación.', price: '$3.500 / usuario / mes' },
    { name: 'Contabilidad',                key: 'contabilidad',  status: 'future', desc: 'Libro diario, mayor, balances, integración SII completa.', price: '$5.500 / usuario / mes' },
    { name: 'Reconciliación Bancaria',    key: 'reconciliacion',status: 'future', desc: 'Módulo independiente de conciliación bancaria.', price: '$6.500 / usuario / mes' },
    { name: 'Inventario',                  key: 'inventario',    status: 'future', desc: 'Gestión de stock.', price: '$2.000 / usuario / mes' },
    { name: 'Vacaciones / RRHH',           key: 'vacaciones',    status: 'future', desc: 'Vacaciones, ausentismo, desempeño. Parte del ERP de RRHH completo.', price: '$3.000 / usuario / mes' },
    { name: 'CRM',                         key: 'crm',           status: 'future', desc: 'Base Contact ya implementada. Módulo CRM completo pendiente.', price: '$8.500 / usuario / mes' },
    { name: 'Contratos',                   key: 'contratos',     status: 'future', desc: 'Gestión de contratos.', price: '$8.500 / usuario / mes' },
  ]}
];
const BADGE = {
  done:   { cls: 'b-done',   label: '✓ listo' },
  schema: { cls: 'b-schema', label: '~ en curso' },
  plan:   { cls: 'b-plan',   label: '◷ planificado' },
  future: { cls: 'b-future', label: '○ futuro' },
};
function render() {
  const container = document.getElementById('content');
  let allItems = [];
  SECTIONS.forEach(sec => {
    allItems = allItems.concat(sec.items);
    const section = document.createElement('div');
    section.className = 'section';
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = sec.title;
    section.appendChild(title);
    const grid = document.createElement('div');
    grid.className = 'grid';
    sec.items.forEach(item => {
      const b = BADGE[item.status];
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<div class="card-top"><div><div class="card-name">${item.name}</div><div class="card-key">${item.key}</div></div><span class="badge ${b.cls}">${b.label}</span></div><div class="card-desc">${item.desc}</div>${item.price ? `<div class="card-price">${item.price}</div>` : ''}`;
      grid.appendChild(card);
    });
    section.appendChild(grid);
    container.appendChild(section);
  });
  const counts = { done: 0, schema: 0, plan: 0, future: 0 };
  allItems.forEach(i => counts[i.status]++);
  const total = allItems.length;
  document.getElementById('cnt-done').textContent   = counts.done;
  document.getElementById('cnt-schema').textContent = counts.schema;
  document.getElementById('cnt-plan').textContent   = counts.plan;
  document.getElementById('cnt-future').textContent = counts.future;
  setTimeout(() => {
    document.getElementById('pb-done').style.width   = (counts.done   / total * 100).toFixed(1) + '%';
    document.getElementById('pb-schema').style.width = (counts.schema / total * 100).toFixed(1) + '%';
    document.getElementById('pb-plan').style.width   = (counts.plan   / total * 100).toFixed(1) + '%';
  }, 100);
  document.getElementById('updated-ts').textContent = 'Actualizado: ' + new Date().toLocaleDateString('es-CL', { year:'numeric', month:'long', day:'numeric' });
}
render();
</script>
</body>
</html>
